general_configuration:
  image_size: [256, 256]
  crop_size: [224, 224] # If the backbone is "efficientnet" the crop_size is setted as the size of the model's input
  valid_extensions: [".bmp", ".BMP"]

dataset_pipeline:
  dataset_version: 1.0.0
  split_source: True
  seed: 42
  paths:
    source_unsplitted_dataset: "D:/emanuele/Code/dataset_source"
    source_training: "D:/emanuele/Code/dataset_splitted/training"
    source_validation: "D:/emanuele/Code/dataset_splitted/validation"
    dest_transfer_learning: "./data/dataset_supcon"
    dest_patchcore: "./data/dataset_patchcore"

  classes:
    good_categories: ["good"]
    test_only_good_categories: ["dust"]
    defect_categories: ["nodi", "paglie"]

  ratios:
    training_ratio: 0.6
    tl_allocation_ratio: 0.30
    good_stress_multiplier: 1
    cimossa_undersampling_ratio: 0.40
    good_limit_patchcore: 500

  augmentation_params:
    prob_h_flip: 0.5
    prob_v_flip: 0.5
    prob_rot_180: 0.5
    prob_stress: 0.5
    textile_intensity_range: [0.2, 0.6]
    textile_waves_range: [0.5, 0.7]
    textile_force_range: [0.0, 40.0]

model_architecture:
  backbone: "resnet18"
  layers: ["layer1", "layer2", "layer3"]
  weights: "DEFAULT"

transfer_learning:
  data_dir: "./data/dataset_supcon"     
  num_epochs: 10                        
  batch_size: 16                        
  learning_rate: 0.0001                 
  temperature: 0.07                     
  out_dim: 128                          
  save_dir: "custom_weights"

datamodule_configuration:
  root: "./data"
  train_dir: "./data/dataset_patchcore/train"
  test_dir_good: "./data/dataset_patchcore/test/good"
  test_dir_reject: "./data/dataset_patchcore/test/reject"

patchcore_configuration:
  num_epochs: 1
  train_batch_size: 16
  eval_batch_size: 16
  coreset_sampling_ratio: 0.01
  num_nearest_neighbors: 9
  
efficientad_settings:
  num_epochs: 100           
  train_batch_size: 16       
  eval_batch_size: 16
  model_size: "s"           
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_workers: 4

reversedistillation_settings:
  num_epochs: 10
  train_batch_size: 32
  eval_batch_size: 32

paths:
  symlink_path: "results/Patchcore/textiles/latest"
  anomaly_images: "results/Patchcore/anomaly_images"
  report_path: "results/Patchcore/report"
  auroc_path: "results/Patchcore/AUROC"
  eda_path: "results/EDA"
  benchmark_pareto_front_patchcore: "results/benchmark/benchmark_pareto_front_patchcore.csv"
  benchmark_pareto_front_efficientad: "results/benchmark/benchmark_pareto_front_efficientad.csv"
  checkpoint_destination: "checkpoints/patchcore-tested.ckpt"
  exports_onnx_path: "exports/patchcore_onnx"
  config_src_path: "config.yaml"
  config_dst_path: "results/Patchcore/config"